dir: ./tasks
id:
  strategy: ulid
  length: 9
todos:
  exclude:
    - "parser_test.go"
    - "scanner_test.go"
    - "scope_test.go"
    - "blame_test.go"
    - "todos_test.go"
phases:
  - id: phase-support
    name: "Phase Support"
    description: "Add phase ID field, phases CLI command, and web phase features"
  - id: skill-benchmarks
    name: "Skill Benchmarks"
    description: "Establish quality baselines for all agent skills"
  - id: web-ui
    name: "Web UI"
    description: "Enhance the web interface with interactivity and test coverage"
  - id: feed-enhancements
    name: "Feed Enhancements"
    description: "Improve the feed command with richer output capabilities"
  - id: vscode-extension
    name: "VSCode Extension"
    description: "Build and publish the VSCode extension"
  - id: windows-support
    name: "Windows Support"
    description: "Expand platform reach to Windows"
  - id: external-integrations
    name: "External Integrations"
    description: "Sync and import from third-party tools"
  - id: language-libraries
    name: "Language Libraries"
    description: "Expand ecosystem with SDK libraries"
web:
  auto_open_browser: false
scopes:
  cli:
    paths:
      - "apps/cli/"
  cli/report:
    paths:
      - "apps/cli/internal/cli/report.go"
  cli/metrics:
    paths:
      - "apps/cli/internal/metrics/"
      - "apps/cli/internal/cli/metrics.go"
  cli/graph:
    paths:
      - "apps/cli/internal/graph/"
      - "apps/cli/internal/cli/graph.go"
  cli/rm:
    paths:
      - "apps/cli/internal/cli/rm.go"
  cli/archive:
    paths:
      - "apps/cli/internal/cli/archive.go"
  cli/set:
    paths:
      - "apps/cli/internal/cli/set.go"
  cli/mcp:
    paths:
      - "apps/cli/internal/mcp/"
      - "apps/cli/internal/cli/mcp.go"
  cli/validate:
    paths:
      - "apps/cli/internal/validate/"
      - "apps/cli/internal/cli/validate.go"
  cli/commands:
    paths:
      - "apps/cli/internal/cli/"
  cli/config:
    paths:
      - "apps/cli/"
  cli/import:
    paths:
      - "apps/cli/internal/cli/import.go"
  cli/next:
    paths:
      - "apps/cli/internal/cli/next.go"
  cli/tracks:
    paths:
      - "apps/cli/internal/tracks/"
      - "apps/cli/internal/cli/tracks.go"
  cli/scanner:
    paths:
      - "apps/cli/internal/scanner/"
  sync/core:
    paths:
      - "apps/cli/internal/sync/source.go"
      - "apps/cli/internal/sync/engine.go"
      - "apps/cli/internal/sync/registry.go"
      - "apps/cli/internal/sync/mapper.go"
      - "apps/cli/internal/sync/config.go"
  sync/jira:
    paths:
      - "apps/cli/internal/sync/jira/"
  sync/linear:
    paths:
      - "apps/cli/internal/sync/linear/"
  sync/trello:
    paths:
      - "apps/cli/internal/sync/trello/"
  vscode:
    paths:
      - "apps/vscode/"
  web:
    paths:
      - "apps/web/"
  web/layout:
    paths:
      - "apps/web/src/components/layout/"
  web/board:
    paths:
      - "apps/web/src/components/board/"
  web/graph:
    paths:
      - "apps/web/src/components/graph/"
  web/tasks:
    paths:
      - "apps/web/src/components/tasks/"
  web/stats:
    paths:
      - "apps/web/src/components/stats/"
