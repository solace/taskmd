name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: apps/cli
          args: --timeout=5m

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest] # TODO: re-enable windows-latest (see task 208)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        working-directory: apps/cli
        shell: bash
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: apps/cli/coverage.txt
          flags: cli
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-cli:
    name: Build CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build CLI only
        working-directory: apps/cli
        run: go build -v ./cmd/taskmd

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build-cli]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run e2e tests
        working-directory: apps/cli
        run: go test -tags e2e -count=1 -v ./internal/e2e/...

  test-web:
    name: Test Web Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            apps/web/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        working-directory: apps/web
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/web/coverage/lcov.info
          flags: web
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-web:
    name: Build Web Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            apps/web/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Build web frontend
        working-directory: apps/web
        run: pnpm build

  build-full:
    name: Build Full (CLI + Embedded Web)
    runs-on: ubuntu-latest
    needs: [build-cli, build-web]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            apps/web/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Build web frontend
        working-directory: apps/web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Copy web assets to CLI
        run: |
          mkdir -p apps/cli/internal/web/static
          cp -r apps/web/dist apps/cli/internal/web/static/dist

      - name: Build CLI with embedded web
        working-directory: apps/cli
        run: go build -tags embed_web -v ./cmd/taskmd

      - name: Verify binary
        working-directory: apps/cli
        run: |
          ./taskmd --version
          ./taskmd --help

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: taskmd:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          # Create a test task file
          mkdir -p test-tasks
          cat > test-tasks/001-test.md << 'EOF'
          ---
          id: "001"
          title: "Test task"
          status: pending
          priority: medium
          ---
          # Test task
          EOF

          # Start the container in the background
          docker run -d --name taskmd-test \
            -p 8080:8080 \
            -v "$(pwd)/test-tasks:/tasks:ro" \
            taskmd:ci-test

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/tasks > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            sleep 1
          done

          # Verify API endpoints
          curl -sf http://localhost:8080/api/tasks | head -c 500
          echo
          curl -sf http://localhost:8080/api/config | head -c 500
          echo

      - name: Check image size
        run: |
          SIZE=$(docker image inspect taskmd:ci-test --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 50 ]; then
            echo "ERROR: Image size ${SIZE_MB}MB exceeds 50MB limit"
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          docker stop taskmd-test 2>/dev/null || true
          docker rm taskmd-test 2>/dev/null || true
